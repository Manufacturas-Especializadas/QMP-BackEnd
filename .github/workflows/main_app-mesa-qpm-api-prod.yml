name: Build and deploy ASP.Net Core app to Azure Web App - app-mesa-qpm-api-prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore ./API/API.csproj
      - name: Build
        run: dotnet build ./API/API.csproj --configuration Release --no-restore
      - name: Publish
        run: dotnet publish ./API/API.csproj -c Release -o ./publish --no-build
      - name: List publish output
        run: ls -la ./publish
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dotnet-app
          path: ./publish
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-mesa-qpm-api-prod'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_87231F6B55294447957DA70171005659 }}
          package: ./publish
